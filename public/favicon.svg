<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="10" fill="#0C0A09"/>
  <!-- Redragon dragon silhouette approximation in red -->
  <g fill="#CC0000">
    <!-- Body -->
    <ellipse cx="32" cy="36" rx="13" ry="10"/>
    <!-- Head -->
    <ellipse cx="38" cy="24" rx="9" ry="7"/>
    <!-- Jaw open -->
    <ellipse cx="42" cy="29" rx="6" ry="3.5"/>
    <!-- Wing left -->
    <polygon points="19,22 8,14 15,30 22,28"/>
    <!-- Wing right -->
    <polygon points="45,20 54,10 50,28 43,25"/>
    <!-- Tail -->
    <polygon points="20,38 10,48 24,44 25,40"/>
  </g>
  <!-- Eye -->
  <circle cx="40" cy="22" r="2" fill="#FF4444"/>
</svg>
