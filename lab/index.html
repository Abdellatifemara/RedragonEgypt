<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <meta name="robots" content="noindex,nofollow"/>
  <title>Redragon Egypt — Products</title>
  <link rel="icon" href="/images/logo_redragon.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Chakra+Petch:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#CC0000;
  --bg:#0c0c0e;
  --surface:#141417;
  --surface2:#1c1c21;
  --border:rgba(255,255,255,.07);
  --text:#f0eef5;
  --sub:#8a8898;
  --font-h:'Russo One',sans-serif;
  --font:'Chakra Petch',sans-serif;
  --ease:cubic-bezier(.25,.46,.45,.94);
}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden}

/* ─── NAV ──────────────────────────────────────── */
.nav{
  position:sticky;top:0;z-index:200;
  height:60px;padding:0 24px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(12,12,14,.92);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.nav-logo img{height:28px}
.nav-logo-text{font-family:var(--font-h);font-size:.65rem;letter-spacing:.22em;color:var(--red);text-transform:uppercase}
.nav-tag{font-size:.58rem;letter-spacing:.15em;color:var(--sub);border:1px solid var(--border);padding:3px 9px;text-transform:uppercase}

/* ─── HERO ─────────────────────────────────────── */
.hero{
  padding:56px 24px 40px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:flex-end;justify-content:space-between;gap:24px;
  flex-wrap:wrap;
}
.hero-title{
  font-family:var(--font-h);
  font-size:clamp(2rem,5vw,3.8rem);
  line-height:1;
  text-transform:uppercase;
  letter-spacing:-.01em;
}
.hero-title em{font-style:normal;color:var(--red)}
.hero-meta{font-size:.72rem;color:var(--sub);margin-top:10px;letter-spacing:.05em}

/* ─── TOOLBAR ──────────────────────────────────── */
.toolbar{
  position:sticky;top:60px;z-index:150;
  background:rgba(12,12,14,.97);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  padding:0 24px;
  display:flex;align-items:stretch;gap:0;
  overflow-x:auto;scrollbar-width:none;
}
.toolbar::-webkit-scrollbar{display:none}

.cat-btn{
  flex-shrink:0;
  font-family:var(--font);font-weight:600;
  font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;
  color:var(--sub);background:none;border:none;
  padding:0 18px;height:46px;cursor:pointer;
  position:relative;white-space:nowrap;
  transition:color .2s;
}
.cat-btn::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:var(--red);transform:scaleX(0);transition:transform .2s var(--ease);
}
.cat-btn:hover{color:var(--text)}
.cat-btn.on{color:#fff}
.cat-btn.on::after{transform:scaleX(1)}
.cat-cnt{font-size:.5rem;vertical-align:super;margin-left:3px;color:var(--red)}

.toolbar-right{
  margin-left:auto;flex-shrink:0;
  display:flex;align-items:center;gap:10px;padding-left:20px;
  border-left:1px solid var(--border);
}
.search-box{
  position:relative;display:flex;align-items:center;
}
.search-box svg{
  position:absolute;left:9px;width:13px;height:13px;color:var(--sub);pointer-events:none;
}
.search-box input{
  font-family:var(--font);font-size:.7rem;
  background:var(--surface);border:1px solid var(--border);
  color:var(--text);padding:7px 10px 7px 28px;
  width:170px;outline:none;
  transition:border-color .2s;
}
.search-box input::placeholder{color:var(--sub)}
.search-box input:focus{border-color:var(--red)}

.view-btn{
  width:34px;height:34px;border:1px solid var(--border);
  background:none;cursor:pointer;color:var(--sub);
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;flex-shrink:0;
}
.view-btn.on,.view-btn:hover{background:var(--surface2);color:var(--text);border-color:rgba(255,255,255,.15)}
.view-btn svg{width:15px;height:15px}

/* ─── GRID ─────────────────────────────────────── */
.page{padding:24px}
.prod-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:1px;
  background:var(--border);
}
.prod-grid.list-view{
  grid-template-columns:1fr;
  gap:1px;
}

/* ─── CARD (grid) ─────────────────────────────── */
.prod-card{
  background:var(--surface);
  cursor:pointer;
  display:flex;flex-direction:column;
  position:relative;overflow:hidden;
  transition:background .18s;
}
.prod-card:hover{background:var(--surface2)}

.card-img{
  aspect-ratio:1/1;
  background:linear-gradient(145deg,#111116,#1a1a22);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;position:relative;
}
.card-img img{
  width:75%;height:75%;object-fit:contain;
  transition:transform .3s var(--ease);
  filter:drop-shadow(0 4px 16px rgba(0,0,0,.5));
}
.prod-card:hover .card-img img{transform:scale(1.07)}

/* Red bottom bar reveal on hover */
.card-img::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:var(--red);transform:scaleX(0);
  transition:transform .25s var(--ease);transform-origin:left;
}
.prod-card:hover .card-img::after{transform:scaleX(1)}

.card-cat-badge{
  position:absolute;top:10px;left:10px;
  font-size:.48rem;letter-spacing:.2em;text-transform:uppercase;
  color:var(--red);background:rgba(12,12,14,.8);
  border:1px solid rgba(204,0,0,.25);
  padding:2px 7px;
}

.card-info{
  padding:14px 16px 16px;
  flex:1;display:flex;flex-direction:column;
  border-top:1px solid var(--border);
}
.card-model{
  font-family:var(--font-h);font-size:.95rem;color:#fff;
  line-height:1.1;margin-bottom:4px;
}
.card-name{
  font-size:.65rem;color:var(--sub);line-height:1.45;
  flex:1;margin-bottom:10px;
}
.card-pills{display:flex;gap:5px;flex-wrap:wrap}
.pill{
  font-size:.48rem;letter-spacing:.12em;text-transform:uppercase;
  padding:2px 7px;border:1px solid;
}
.pill-sw {color:#60a5fa;border-color:rgba(96,165,250,.25)}
.pill-man{color:#34d399;border-color:rgba(52,211,153,.25)}

/* ─── LIST CARD ─────────────────────────────────── */
.prod-grid.list-view .prod-card{
  flex-direction:row;align-items:center;
}
.prod-grid.list-view .card-img{
  aspect-ratio:unset;width:100px;height:80px;flex-shrink:0;
  border-right:1px solid var(--border);border-bottom:none;
}
.prod-grid.list-view .card-img img{width:65%;height:65%}
.prod-grid.list-view .card-img::after{
  bottom:unset;top:0;height:100%;width:2px;right:unset;
  transform:scaleY(0);transform-origin:bottom;
}
.prod-grid.list-view .prod-card:hover .card-img::after{transform:scaleY(1)}
.prod-grid.list-view .card-info{
  flex-direction:row;align-items:center;gap:16px;
  padding:12px 16px;border-top:none;
}
.prod-grid.list-view .card-model{font-size:.88rem;margin-bottom:0;min-width:80px;flex-shrink:0}
.prod-grid.list-view .card-name{margin-bottom:0;flex:1}
.prod-grid.list-view .card-pills{margin-left:auto;flex-wrap:nowrap}
.prod-grid.list-view .card-cat-badge{display:none}

/* ─── EMPTY ─────────────────────────────────────── */
.empty{
  grid-column:1/-1;padding:100px 20px;text-align:center;
  background:var(--surface);
}
.empty-title{font-family:var(--font-h);font-size:1.1rem;color:rgba(204,0,0,.3);letter-spacing:.1em;margin-bottom:8px}
.empty-sub{font-size:.72rem;color:var(--sub)}

/* ─── DRAWER ─────────────────────────────────────── */
.drawer-overlay{
  position:fixed;inset:0;z-index:300;
  background:rgba(0,0,0,.6);
  opacity:0;pointer-events:none;
  transition:opacity .3s;
}
.drawer-overlay.open{opacity:1;pointer-events:all}

.drawer{
  position:fixed;top:0;right:0;bottom:0;
  width:min(420px,100vw);
  z-index:301;
  background:var(--surface);
  border-left:1px solid rgba(204,0,0,.2);
  display:flex;flex-direction:column;
  transform:translateX(100%);
  transition:transform .32s var(--ease);
  overflow:hidden;
}
.drawer.open{transform:translateX(0)}

/* Drawer header — sticky */
.drawer-head{
  flex-shrink:0;
  padding:0 16px 0 20px;
  height:52px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);
  background:var(--surface);
}
.drawer-head-label{font-size:.55rem;letter-spacing:.25em;color:var(--red);text-transform:uppercase}
.drawer-close{
  width:32px;height:32px;border:1px solid var(--border);
  background:none;color:var(--sub);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:.8rem;
  transition:all .18s;flex-shrink:0;
}
.drawer-close:hover{background:var(--red);color:#fff;border-color:var(--red)}

/* Drawer body — scrollable */
.drawer-body{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
}

/* Big image */
.drawer-img-wrap{
  background:linear-gradient(160deg,#111116,#191922);
  aspect-ratio:4/3;
  display:flex;align-items:center;justify-content:center;
  position:relative;
}
.drawer-img-wrap img{
  max-width:72%;max-height:72%;
  object-fit:contain;
  filter:drop-shadow(0 8px 32px rgba(204,0,0,.18));
}
.drawer-img-wrap::after{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 60% 60% at 50% 50%,rgba(204,0,0,.08),transparent 70%);
}

/* Thumbnail row */
.thumb-row{
  display:flex;gap:6px;padding:10px 16px;
  border-bottom:1px solid var(--border);
  overflow-x:auto;scrollbar-width:none;
  background:var(--surface);
}
.thumb-row::-webkit-scrollbar{display:none}
.thumb-item{
  flex-shrink:0;width:52px;height:52px;
  border:1px solid var(--border);background:var(--bg);
  cursor:pointer;overflow:hidden;
  transition:border-color .18s;
}
.thumb-item img{width:100%;height:100%;object-fit:contain;padding:5px}
.thumb-item.on,.thumb-item:hover{border-color:var(--red)}

/* Info block */
.drawer-info{padding:20px}
.d-cat{font-size:.54rem;letter-spacing:.28em;color:var(--red);text-transform:uppercase;margin-bottom:6px}
.d-name{font-family:var(--font-h);font-size:1.25rem;color:#fff;line-height:1.1;margin-bottom:4px}
.d-model{font-size:.62rem;color:var(--sub);letter-spacing:.14em;margin-bottom:18px}

.d-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px;padding-bottom:18px;border-bottom:1px solid var(--border)}
.btn{
  display:inline-flex;align-items:center;gap:6px;
  font-family:var(--font);font-weight:600;
  font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;
  text-decoration:none;padding:9px 15px;cursor:pointer;border:none;
  transition:all .18s var(--ease);
}
.btn-primary{background:var(--red);color:#fff}
.btn-primary:hover{background:#a80000}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--red);color:var(--red)}
.btn svg{width:12px;height:12px;flex-shrink:0}

.d-section{margin-bottom:20px}
.d-section-title{
  font-size:.52rem;letter-spacing:.26em;text-transform:uppercase;
  color:var(--red);margin-bottom:9px;padding-bottom:6px;
  border-bottom:1px solid rgba(204,0,0,.12);
}
.feat-list{list-style:none;display:flex;flex-direction:column;gap:5px}
.feat-list li{
  font-size:.74rem;color:#a0a0b8;line-height:1.5;
  padding-left:12px;position:relative;
}
.feat-list li::before{
  content:'';position:absolute;left:0;top:9px;
  width:3px;height:3px;border-radius:50%;background:var(--red);
}

/* SPECS TABLE — the fix: word-break + proper widths */
.specs-table{
  width:100%;border-collapse:collapse;
  font-size:.72rem;table-layout:fixed;
}
.specs-table tr{border-bottom:1px solid rgba(255,255,255,.04)}
.specs-table tr:last-child{border-bottom:none}
.specs-table td{
  padding:6px 4px 6px 0;
  vertical-align:top;
  word-break:break-word;
  white-space:normal;
  overflow-wrap:break-word;
  line-height:1.4;
}
.specs-table td:first-child{
  width:38%;
  color:var(--sub);
  font-size:.62rem;letter-spacing:.06em;text-transform:uppercase;
  padding-right:10px;
}
.specs-table td:last-child{color:#c8c6d4}

/* ─── FOOTER ─────────────────────────────────────── */
.footer{
  margin-top:48px;padding:24px;
  border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  gap:16px;flex-wrap:wrap;font-size:.65rem;color:var(--sub);
}

/* ─── RESPONSIVE ─────────────────────────────────── */
@media(max-width:1100px){.prod-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:820px){
  .prod-grid{grid-template-columns:repeat(2,1fr)}
  .toolbar-right{display:none}
}
@media(max-width:480px){
  .prod-grid{grid-template-columns:repeat(2,1fr)}
  .page{padding:12px}
}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{transition:none!important;animation:none!important}}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <a class="nav-logo" href="/">
    <img src="/images/logo_redragon.png" alt="Redragon"/>
    <span class="nav-logo-text">Egypt</span>
  </a>
  <span class="nav-tag">Product Catalog</span>
</nav>

<!-- HERO -->
<section class="hero">
  <div>
    <h1 class="hero-title">Master Every<br><em>Game.</em></h1>
    <p class="hero-meta" id="hero-meta">Loading products…</p>
  </div>
</section>

<!-- TOOLBAR -->
<div class="toolbar" id="toolbar">
  <button class="cat-btn on" data-cat="All">All<span class="cat-cnt" id="cnt-All"></span></button>
  <button class="cat-btn" data-cat="Mouse">Mouse<span class="cat-cnt" id="cnt-Mouse"></span></button>
  <button class="cat-btn" data-cat="Keyboard">Keyboard<span class="cat-cnt" id="cnt-Keyboard"></span></button>
  <button class="cat-btn" data-cat="Headset">Headset<span class="cat-cnt" id="cnt-Headset"></span></button>
  <button class="cat-btn" data-cat="Gamepad">Gamepad<span class="cat-cnt" id="cnt-Gamepad"></span></button>
  <button class="cat-btn" data-cat="Accessories">Accessories<span class="cat-cnt" id="cnt-Accessories"></span></button>
  <button class="cat-btn" data-cat="Combo">Combo<span class="cat-cnt" id="cnt-Combo"></span></button>

  <div class="toolbar-right">
    <div class="search-box">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path stroke-linecap="round" d="m21 21-4.35-4.35"/></svg>
      <input id="search" type="text" placeholder="Search…" autocomplete="off"/>
    </div>
    <!-- Grid view -->
    <button class="view-btn on" id="btn-grid" aria-label="Grid view">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    </button>
    <!-- List view -->
    <button class="view-btn" id="btn-list" aria-label="List view">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    </button>
  </div>
</div>

<!-- GRID -->
<main class="page">
  <div class="prod-grid" id="grid"></div>
</main>

<!-- DRAWER OVERLAY -->
<div class="drawer-overlay" id="drawer-overlay"></div>

<!-- DRAWER -->
<aside class="drawer" id="drawer" role="dialog" aria-modal="true" aria-hidden="true" aria-label="Product details">
  <div class="drawer-head">
    <span class="drawer-head-label" id="d-label">—</span>
    <button class="drawer-close" id="drawer-close" aria-label="Close">✕</button>
  </div>
  <div class="drawer-body" id="drawer-body">
    <div class="drawer-img-wrap"><img id="d-img" src="" alt=""/></div>
    <div class="thumb-row" id="d-thumbs"></div>
    <div class="drawer-info">
      <p class="d-cat" id="d-cat"></p>
      <h2 class="d-name" id="d-name"></h2>
      <p class="d-model" id="d-model"></p>
      <div class="d-actions" id="d-actions"></div>
      <div class="d-section" id="d-feat-wrap">
        <h3 class="d-section-title">Key Features</h3>
        <ul class="feat-list" id="d-feats"></ul>
      </div>
      <div class="d-section" id="d-spec-wrap">
        <h3 class="d-section-title">Specifications</h3>
        <table class="specs-table" id="d-specs"></table>
      </div>
    </div>
  </div>
</aside>

<!-- FOOTER -->
<footer class="footer">
  <span><strong style="color:#fff">Redragon Egypt</strong> — Elessawi Group</span>
  <span>+201025069999 · info@redragonegypt.com</span>
</footer>

<script>
(function(){
'use strict';
const LOGO = '/images/logo_redragon.png';
function img(s){return !s?LOGO:s.startsWith('http')?s:'/images/products/'+s}

let all=[], cat='All', q='', listMode=false;

/* ── RENDER ─────────────────────────────────────── */
function render(){
  const grid=document.getElementById('grid');
  const items=all.filter(p=>{
    const cOk=cat==='All'||p.category===cat;
    const sq=q.toLowerCase();
    const qOk=!sq||[p.name,p.model,p.category].some(v=>v&&v.toLowerCase().includes(sq));
    return cOk&&qOk;
  });
  if(!items.length){
    grid.innerHTML='<div class="empty"><div class="empty-title">NO PRODUCTS FOUND</div><div class="empty-sub">Try a different filter or search term.</div></div>';
    return;
  }
  grid.innerHTML=items.map(p=>{
    const t=p.images&&p.images.length?img(p.images[0]):LOGO;
    return `<div class="prod-card" data-id="${p.id}" tabindex="0" role="button" aria-label="${p.name||p.model}">
      <div class="card-img">
        <span class="card-cat-badge">${p.category}</span>
        <img src="${t}" alt="${p.name||p.model||''}" loading="lazy" onerror="this.src='${LOGO}'"/>
      </div>
      <div class="card-info">
        <div class="card-model">${p.model||p.id}</div>
        <div class="card-name">${p.name||''}</div>
        ${(p.softwareUrl||p.manualUrl)?`<div class="card-pills">
          ${p.softwareUrl?'<span class="pill pill-sw">Software</span>':''}
          ${p.manualUrl?'<span class="pill pill-man">Manual</span>':''}
        </div>`:''}
      </div>
    </div>`;
  }).join('');
  grid.querySelectorAll('.prod-card').forEach(c=>{
    c.addEventListener('click',()=>open(c.dataset.id));
    c.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' ')open(c.dataset.id)});
  });
}

/* ── COUNTS ─────────────────────────────────────── */
function counts(){
  ['All','Mouse','Keyboard','Headset','Gamepad','Accessories','Combo'].forEach(c=>{
    const el=document.getElementById('cnt-'+c);
    if(el) el.textContent=c==='All'?all.length:all.filter(p=>p.category===c).length;
  });
  document.getElementById('hero-meta').textContent=
    all.length+' products · Authorized Distributor · Egypt';
}

/* ── FILTER & SEARCH ─────────────────────────────── */
document.querySelectorAll('.cat-btn').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.cat-btn').forEach(x=>x.classList.remove('on'));
    b.classList.add('on'); cat=b.dataset.cat; render();
  });
});
const searchEl=document.getElementById('search');
if(searchEl) searchEl.addEventListener('input',()=>{q=searchEl.value.trim();render()});

/* ── VIEW TOGGLE ─────────────────────────────────── */
document.getElementById('btn-grid').addEventListener('click',()=>{
  listMode=false;
  document.getElementById('grid').classList.remove('list-view');
  document.getElementById('btn-grid').classList.add('on');
  document.getElementById('btn-list').classList.remove('on');
});
document.getElementById('btn-list').addEventListener('click',()=>{
  listMode=true;
  document.getElementById('grid').classList.add('list-view');
  document.getElementById('btn-list').classList.add('on');
  document.getElementById('btn-grid').classList.remove('on');
});

/* ── DRAWER ─────────────────────────────────────── */
const overlay=document.getElementById('drawer-overlay');
const drawer =document.getElementById('drawer');
const dBody  =document.getElementById('drawer-body');

function open(id){
  const p=all.find(x=>x.id===id);
  if(!p) return;

  document.getElementById('d-label').textContent=(p.model||p.id)+' / '+p.category;
  document.getElementById('d-cat').textContent=p.category;
  document.getElementById('d-name').textContent=p.name||p.model||p.id;
  document.getElementById('d-model').textContent=p.model?'MODEL  '+p.model:'';

  // main image
  const imgs=p.images&&p.images.length?p.images:[];
  const mainImg=document.getElementById('d-img');
  mainImg.src=imgs.length?img(imgs[0]):LOGO;
  mainImg.alt=p.name||p.model||'';
  mainImg.onerror=()=>{mainImg.src=LOGO};

  // thumbs
  const thumbRow=document.getElementById('d-thumbs');
  if(imgs.length>1){
    thumbRow.style.display='';
    thumbRow.innerHTML=imgs.map((s,i)=>`
      <div class="thumb-item${i===0?' on':''}" data-i="${i}">
        <img src="${img(s)}" alt="" onerror="this.src='${LOGO}'"/>
      </div>`).join('');
    thumbRow.querySelectorAll('.thumb-item').forEach(t=>{
      t.addEventListener('click',()=>{
        mainImg.src=img(imgs[+t.dataset.i]);
        thumbRow.querySelectorAll('.thumb-item').forEach(x=>x.classList.remove('on'));
        t.classList.add('on');
      });
    });
  } else {
    thumbRow.style.display='none';
  }

  // actions
  const acts=document.getElementById('d-actions');
  acts.innerHTML='';
  if(p.softwareUrl){
    const a=document.createElement('a');
    a.href=p.softwareUrl;a.target='_blank';a.rel='noopener';
    a.className='btn btn-primary';
    a.innerHTML=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Download Software`;
    acts.appendChild(a);
  }
  if(p.manualUrl){
    const a=document.createElement('a');
    a.href=p.manualUrl;a.target='_blank';a.rel='noopener';
    a.className='btn btn-outline';
    a.innerHTML=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>User Manual`;
    acts.appendChild(a);
  }

  // features
  const featWrap=document.getElementById('d-feat-wrap');
  const feats=(p.features||p.keyFeatures||[]);
  if(feats.length){
    featWrap.style.display='';
    document.getElementById('d-feats').innerHTML=feats.map(f=>`<li>${f}</li>`).join('');
  } else {featWrap.style.display='none'}

  // specs
  const specWrap=document.getElementById('d-spec-wrap');
  const specs=p.specs||{};
  const keys=Object.keys(specs);
  if(keys.length){
    specWrap.style.display='';
    document.getElementById('d-specs').innerHTML=
      keys.map(k=>`<tr><td>${k}</td><td>${specs[k]}</td></tr>`).join('');
  } else {specWrap.style.display='none'}

  dBody.scrollTop=0;
  overlay.classList.add('open');
  drawer.classList.add('open');
  drawer.setAttribute('aria-hidden','false');
}

function close(){
  overlay.classList.remove('open');
  drawer.classList.remove('open');
  drawer.setAttribute('aria-hidden','true');
}

document.getElementById('drawer-close').addEventListener('click',close);
overlay.addEventListener('click',close);
document.addEventListener('keydown',e=>{if(e.key==='Escape')close()});

/* ── LOAD ─────────────────────────────────────────── */
fetch('/data/products.json').then(r=>r.json()).then(data=>{
  all=data;counts();render();
}).catch(()=>{
  document.getElementById('grid').innerHTML=
    '<div class="empty"><div class="empty-title">LOAD ERROR</div><div class="empty-sub">Could not fetch products.json</div></div>';
});

})();
</script>
</body>
</html>
