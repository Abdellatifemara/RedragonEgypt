<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Redragon Egypt — Catalog</title>
  <link rel="icon" href="/images/logo_redragon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Chakra+Petch:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Base ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --red:      #CC0000;
      --red-dim:  #8B0000;
      --red-glow: rgba(204,0,0,.35);
      --bg:       #070709;
      --bg2:      #0d0d12;
      --bg3:      #12121a;
      --border:   rgba(204,0,0,.18);
      --text:     #e8e6e3;
      --muted:    #6b6872;
      --font-h:   'Russo One', sans-serif;
      --font-b:   'Chakra Petch', sans-serif;
      --dur:      220ms;
      --ease:     cubic-bezier(.25,.46,.45,.94);
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-b);
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      overflow-x: hidden;
    }

    /* ── Scanline overlay on body ─────────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,.08) 2px,
        rgba(0,0,0,.08) 4px
      );
    }

    /* ── Header ───────────────────────────────────────────────── */
    .site-header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(7,7,9,.92);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 0 32px;
      display: flex; align-items: center; justify-content: space-between;
      height: 64px;
    }
    .header-logo {
      display: flex; align-items: center; gap: 12px;
      text-decoration: none;
    }
    .header-logo img { height: 32px; }
    .header-logo span {
      font-family: var(--font-h);
      font-size: .75rem;
      letter-spacing: .25em;
      color: var(--red);
      text-transform: uppercase;
    }
    .header-badge {
      font-size: .6rem;
      letter-spacing: .2em;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 4px 10px;
      text-transform: uppercase;
    }

    /* ── Hero strip ───────────────────────────────────────────── */
    .hero {
      position: relative;
      padding: 64px 32px 48px;
      overflow: hidden;
    }
    .hero::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--red), transparent);
    }
    .hero-eyebrow {
      font-size: .6rem;
      letter-spacing: .4em;
      color: var(--red);
      text-transform: uppercase;
      margin-bottom: 16px;
      display: flex; align-items: center; gap: 12px;
    }
    .hero-eyebrow::before {
      content: '';
      display: block; width: 32px; height: 1px;
      background: var(--red);
    }
    .hero-title {
      font-family: var(--font-h);
      font-size: clamp(2.4rem, 6vw, 5rem);
      line-height: .9;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: -.02em;
    }
    .hero-title span {
      -webkit-text-stroke: 1px var(--red);
      color: transparent;
    }
    .hero-sub {
      margin-top: 20px;
      font-size: .8rem;
      color: var(--muted);
      letter-spacing: .08em;
      max-width: 420px;
      line-height: 1.8;
    }
    .hero-bg-text {
      position: absolute;
      right: -20px; top: 50%;
      transform: translateY(-50%);
      font-family: var(--font-h);
      font-size: clamp(5rem, 18vw, 14rem);
      color: rgba(204,0,0,.04);
      text-transform: uppercase;
      pointer-events: none;
      user-select: none;
      white-space: nowrap;
      line-height: 1;
    }

    /* ── Controls bar ─────────────────────────────────────────── */
    .controls {
      padding: 0 32px;
      margin-bottom: 0;
      display: flex; align-items: center; gap: 0;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      scrollbar-width: none;
    }
    .controls::-webkit-scrollbar { display: none; }
    .filter-btn {
      flex-shrink: 0;
      font-family: var(--font-b);
      font-weight: 600;
      font-size: .65rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--muted);
      background: none;
      border: none;
      padding: 16px 20px;
      cursor: pointer;
      position: relative;
      transition: color var(--dur) var(--ease);
      white-space: nowrap;
    }
    .filter-btn::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 2px;
      background: var(--red);
      transform: scaleX(0);
      transition: transform var(--dur) var(--ease);
    }
    .filter-btn:hover { color: var(--text); }
    .filter-btn.active { color: #fff; }
    .filter-btn.active::after { transform: scaleX(1); }
    .filter-count {
      display: inline-block;
      font-size: .55rem;
      vertical-align: super;
      margin-left: 4px;
      color: var(--red);
    }
    .controls-right {
      margin-left: auto;
      flex-shrink: 0;
      padding: 0 0 0 20px;
      display: flex; align-items: center; gap: 12px;
    }
    .search-wrap {
      position: relative;
    }
    .search-wrap svg {
      position: absolute; left: 10px; top: 50%;
      transform: translateY(-50%);
      width: 14px; height: 14px;
      color: var(--muted);
      pointer-events: none;
    }
    #search {
      background: var(--bg2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-b);
      font-size: .72rem;
      padding: 7px 12px 7px 32px;
      width: 180px;
      outline: none;
      transition: border-color var(--dur);
    }
    #search::placeholder { color: var(--muted); }
    #search:focus { border-color: var(--red); }

    /* ── Grid ─────────────────────────────────────────────────── */
    .grid-wrap {
      padding: 32px;
    }
    .prod-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 2px;
    }

    /* ── Product Card ─────────────────────────────────────────── */
    .prod-card {
      position: relative;
      background: var(--bg2);
      cursor: pointer;
      overflow: hidden;
      transition: background var(--dur) var(--ease);
    }

    /* Targeting bracket corners */
    .prod-card::before,
    .prod-card::after {
      content: '';
      position: absolute;
      width: 20px; height: 20px;
      border-color: var(--red);
      border-style: solid;
      z-index: 2;
      opacity: 0;
      transition: opacity var(--dur) var(--ease),
                  transform var(--dur) var(--ease);
    }
    .prod-card::before {
      top: 10px; left: 10px;
      border-width: 2px 0 0 2px;
      transform: translate(-4px, -4px);
    }
    .prod-card::after {
      bottom: 10px; right: 10px;
      border-width: 0 2px 2px 0;
      transform: translate(4px, 4px);
    }
    .prod-card:hover { background: var(--bg3); }
    .prod-card:hover::before,
    .prod-card:hover::after {
      opacity: 1;
      transform: translate(0, 0);
    }

    /* Extra top-right + bottom-left brackets via inner pseudo */
    .card-brackets::before,
    .card-brackets::after {
      content: '';
      position: absolute;
      width: 20px; height: 20px;
      border-color: var(--red);
      border-style: solid;
      z-index: 2;
      opacity: 0;
      transition: opacity var(--dur) var(--ease),
                  transform var(--dur) var(--ease);
    }
    .card-brackets::before {
      top: 10px; right: 10px;
      border-width: 2px 2px 0 0;
      transform: translate(4px, -4px);
    }
    .card-brackets::after {
      bottom: 10px; left: 10px;
      border-width: 0 0 2px 2px;
      transform: translate(-4px, 4px);
    }
    .prod-card:hover .card-brackets::before,
    .prod-card:hover .card-brackets::after {
      opacity: 1;
      transform: translate(0, 0);
    }

    /* Scan-line sweep on hover */
    .card-scan {
      position: absolute;
      top: -100%; left: 0; right: 0;
      height: 40%;
      background: linear-gradient(
        180deg,
        transparent,
        rgba(204,0,0,.06),
        transparent
      );
      z-index: 1;
      pointer-events: none;
      transition: none;
    }
    .prod-card:hover .card-scan {
      animation: scanSweep .6s var(--ease) forwards;
    }
    @keyframes scanSweep {
      0%   { top: -40%; }
      100% { top: 100%; }
    }

    .card-img-wrap {
      position: relative;
      background: linear-gradient(145deg, #0d0d14, #131320);
      aspect-ratio: 1 / 1;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .card-img-wrap img {
      width: 80%; height: 80%;
      object-fit: contain;
      position: relative; z-index: 1;
      transition: transform .3s var(--ease);
      filter: drop-shadow(0 8px 24px rgba(0,0,0,.6));
    }
    .prod-card:hover .card-img-wrap img {
      transform: scale(1.06);
    }

    /* Red crosshair dot center glow on img */
    .card-img-wrap::after {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 55% 55% at 50% 50%,
        rgba(204,0,0,.08) 0%, transparent 70%);
      opacity: 0;
      transition: opacity var(--dur);
    }
    .prod-card:hover .card-img-wrap::after { opacity: 1; }

    .card-cat {
      position: absolute;
      top: 14px; left: 14px;
      z-index: 3;
      font-size: .52rem;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--red);
      background: rgba(7,7,9,.85);
      border: 1px solid rgba(204,0,0,.3);
      padding: 3px 8px;
    }

    .card-body {
      padding: 14px 16px 16px;
      border-top: 1px solid rgba(204,0,0,.1);
      position: relative; z-index: 2;
    }
    .card-model {
      font-family: var(--font-h);
      font-size: 1.05rem;
      color: #fff;
      line-height: 1;
      margin-bottom: 4px;
    }
    .card-name {
      font-size: .68rem;
      color: var(--muted);
      line-height: 1.4;
      letter-spacing: .03em;
    }
    .card-footer {
      margin-top: 12px;
      display: flex; align-items: center; gap: 6px;
    }
    .card-badge {
      font-size: .52rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      padding: 3px 7px;
      border: 1px solid;
    }
    .card-badge.sw  { color: #3b82f6; border-color: rgba(59,130,246,.3); background: rgba(59,130,246,.06); }
    .card-badge.man { color: #10b981; border-color: rgba(16,185,129,.3); background: rgba(16,185,129,.06); }

    /* Empty state */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }
    .empty-title {
      font-family: var(--font-h);
      font-size: 1.4rem;
      color: rgba(204,0,0,.4);
      margin-bottom: 12px;
    }

    /* ── Modal ────────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0;
      z-index: 500;
      background: rgba(0,0,0,.92);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 48px 20px 48px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s;
    }
    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal-panel {
      max-width: 960px;
      margin: 0 auto;
      background: var(--bg2);
      border: 1px solid rgba(204,0,0,.3);
      position: relative;
      transform: translateY(24px);
      transition: transform .35s var(--ease);
    }
    .modal-overlay.open .modal-panel {
      transform: translateY(0);
    }

    /* Targeting brackets on modal */
    .modal-panel::before, .modal-panel::after {
      content: '';
      position: absolute;
      width: 28px; height: 28px;
      border-color: var(--red);
      border-style: solid;
    }
    .modal-panel::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .modal-panel::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

    .modal-header {
      position: sticky; top: 0; z-index: 10;
      background: var(--bg2);
      border-bottom: 1px solid rgba(204,0,0,.15);
      padding: 14px 20px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-header-label {
      font-size: .58rem;
      letter-spacing: .3em;
      color: var(--red);
      text-transform: uppercase;
    }
    .modal-close-btn {
      width: 34px; height: 34px;
      background: rgba(204,0,0,.08);
      border: 1px solid rgba(204,0,0,.25);
      color: var(--text);
      font-size: .85rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background var(--dur);
    }
    .modal-close-btn:hover { background: var(--red); color: #fff; }

    .modal-body {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .modal-img-col {
      background: linear-gradient(145deg, #0a0a10, #131320);
      display: flex; align-items: center; justify-content: center;
      padding: 48px 32px;
      position: relative;
      min-height: 340px;
    }
    .modal-img-col::after {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 60% 60% at 50% 50%,
        rgba(204,0,0,.12) 0%, transparent 70%);
      pointer-events: none;
    }
    .modal-img-col img {
      max-width: 100%; max-height: 320px;
      object-fit: contain;
      position: relative; z-index: 1;
      filter: drop-shadow(0 16px 40px rgba(204,0,0,.2));
    }

    /* Thumbnail strip */
    .modal-thumbs {
      display: flex; gap: 6px;
      position: absolute; bottom: 12px; left: 50%;
      transform: translateX(-50%);
      z-index: 5;
    }
    .modal-thumb {
      width: 40px; height: 40px;
      border: 1px solid var(--border);
      background: var(--bg3);
      cursor: pointer;
      overflow: hidden;
      transition: border-color var(--dur);
    }
    .modal-thumb img { width: 100%; height: 100%; object-fit: contain; padding: 4px; }
    .modal-thumb.active, .modal-thumb:hover { border-color: var(--red); }

    .modal-info-col {
      padding: 32px 28px;
      border-left: 1px solid rgba(204,0,0,.15);
      overflow: visible;
    }
    .modal-cat-label {
      font-size: .56rem;
      letter-spacing: .3em;
      color: var(--red);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .modal-product-name {
      font-family: var(--font-h);
      font-size: 1.5rem;
      color: #fff;
      line-height: 1.1;
      margin-bottom: 4px;
    }
    .modal-model-label {
      font-size: .65rem;
      color: var(--muted);
      letter-spacing: .18em;
      margin-bottom: 20px;
    }
    .modal-actions {
      display: flex; gap: 8px; flex-wrap: wrap;
      margin-bottom: 24px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(204,0,0,.1);
    }
    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      font-family: var(--font-b);
      font-size: .62rem;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 9px 16px;
      cursor: pointer;
      border: none;
      transition: all var(--dur) var(--ease);
    }
    .btn-primary {
      background: var(--red);
      color: #fff;
    }
    .btn-primary:hover { background: #a80000; }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .btn-outline:hover { border-color: var(--red); color: var(--red); }
    .btn svg { width: 13px; height: 13px; flex-shrink: 0; }

    .modal-section { margin-bottom: 22px; }
    .modal-section-title {
      font-size: .55rem;
      letter-spacing: .28em;
      color: var(--red);
      text-transform: uppercase;
      margin-bottom: 10px;
      padding-bottom: 7px;
      border-bottom: 1px solid rgba(204,0,0,.15);
    }
    .features-list {
      list-style: none;
      display: flex; flex-direction: column; gap: 6px;
    }
    .features-list li {
      font-size: .78rem;
      color: #a09da8;
      line-height: 1.5;
      padding-left: 14px;
      position: relative;
    }
    .features-list li::before {
      content: '';
      position: absolute; left: 0; top: 8px;
      width: 4px; height: 1px;
      background: var(--red);
    }
    .specs-table {
      width: 100%;
      border-collapse: collapse;
      font-size: .73rem;
    }
    .specs-table tr { border-bottom: 1px solid rgba(255,255,255,.04); }
    .specs-table tr:last-child { border-bottom: none; }
    .specs-table td {
      padding: 6px 0;
      color: #a09da8;
      vertical-align: top;
    }
    .specs-table td:first-child {
      color: var(--muted);
      font-size: .65rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      width: 42%;
      padding-right: 12px;
    }

    /* ── No results ───────────────────────────────────────────── */
    .no-results {
      grid-column: 1 / -1;
      padding: 100px 20px;
      text-align: center;
    }
    .no-results-title {
      font-family: var(--font-h);
      font-size: 1.2rem;
      color: rgba(204,0,0,.3);
      letter-spacing: .1em;
      margin-bottom: 8px;
    }
    .no-results-sub { font-size: .75rem; color: var(--muted); }

    /* ── Footer ───────────────────────────────────────────────── */
    .site-footer {
      margin-top: 64px;
      padding: 28px 32px;
      border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      gap: 20px; flex-wrap: wrap;
    }
    .footer-brand {
      font-family: var(--font-h);
      font-size: .7rem;
      letter-spacing: .2em;
      color: var(--muted);
    }
    .footer-brand span { color: var(--red); }
    .footer-contact { font-size: .68rem; color: var(--muted); }

    /* ── Responsive ───────────────────────────────────────────── */
    @media (max-width: 768px) {
      .hero { padding: 40px 20px 36px; }
      .controls { padding: 0 20px; }
      .grid-wrap { padding: 20px; }
      .prod-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 2px; }
      .modal-body { grid-template-columns: 1fr; }
      .modal-img-col { min-height: 240px; padding: 32px 20px 56px; }
      .modal-info-col { border-left: none; border-top: 1px solid rgba(204,0,0,.15); padding: 24px 20px; }
      .controls-right { display: none; }
      .hero-bg-text { display: none; }
      .modal-overlay { padding: 0; }
      .modal-panel { border-left: none; border-right: none; }
    }
    @media (max-width: 480px) {
      .prod-grid { grid-template-columns: 1fr 1fr; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <a class="header-logo" href="/">
      <img src="/images/logo_redragon.png" alt="Redragon Egypt" />
      <span>Egypt</span>
    </a>
    <div class="header-badge">Catalog — Internal Preview</div>
  </header>

  <!-- Hero -->
  <section class="hero">
    <div class="hero-eyebrow">Full Product Lineup</div>
    <h1 class="hero-title">Master<br><span>Every Game</span></h1>
    <p class="hero-sub">Authorized distributor for Egypt & North Africa.<br>Gaming peripherals built for champions.</p>
    <div class="hero-bg-text">REDRAGON</div>
  </section>

  <!-- Controls -->
  <nav class="controls" id="controls">
    <button class="filter-btn active" data-cat="All">All <span class="filter-count" id="cnt-all"></span></button>
    <button class="filter-btn" data-cat="Mouse">Mouse <span class="filter-count" id="cnt-Mouse"></span></button>
    <button class="filter-btn" data-cat="Keyboard">Keyboard <span class="filter-count" id="cnt-Keyboard"></span></button>
    <button class="filter-btn" data-cat="Headset">Headset <span class="filter-count" id="cnt-Headset"></span></button>
    <button class="filter-btn" data-cat="Gamepad">Gamepad <span class="filter-count" id="cnt-Gamepad"></span></button>
    <button class="filter-btn" data-cat="Accessories">Accessories <span class="filter-count" id="cnt-Accessories"></span></button>
    <button class="filter-btn" data-cat="Combo">Combo <span class="filter-count" id="cnt-Combo"></span></button>
    <div class="controls-right">
      <div class="search-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path stroke-linecap="round" d="m21 21-4.35-4.35"/></svg>
        <input id="search" type="text" placeholder="Search products..." autocomplete="off" />
      </div>
    </div>
  </nav>

  <!-- Grid -->
  <main class="grid-wrap">
    <div class="prod-grid" id="grid"></div>
  </main>

  <!-- Modal -->
  <div class="modal-overlay" id="modal" role="dialog" aria-modal="true" aria-hidden="true" tabindex="-1">
    <div class="modal-panel" id="modal-panel">
      <div class="modal-header">
        <span class="modal-header-label" id="modal-cat-label">—</span>
        <button class="modal-close-btn" id="modal-close" aria-label="Close">✕</button>
      </div>
      <div class="modal-body">
        <div class="modal-img-col" id="modal-img-col">
          <img id="modal-img" src="" alt="" />
          <div class="modal-thumbs" id="modal-thumbs"></div>
        </div>
        <div class="modal-info-col">
          <p class="modal-cat-label" id="modal-cat"></p>
          <h2 class="modal-product-name" id="modal-name"></h2>
          <p class="modal-model-label" id="modal-model"></p>
          <div class="modal-actions" id="modal-actions"></div>
          <div class="modal-section" id="modal-features-wrap">
            <h3 class="modal-section-title">Key Features</h3>
            <ul class="features-list" id="modal-features"></ul>
          </div>
          <div class="modal-section" id="modal-specs-wrap">
            <h3 class="modal-section-title">Specifications</h3>
            <table class="specs-table" id="modal-specs"></table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="footer-brand"><span>Redragon</span> Egypt — Elessawi Group</div>
    <div class="footer-contact">+201025069999 &nbsp;·&nbsp; info@redragonegypt.com</div>
  </footer>

  <script>
  (function() {
    'use strict';

    const PLACEHOLDER = '/images/logo_redragon.png';

    function imgUrl(src) {
      if (!src) return PLACEHOLDER;
      return src.startsWith('http') ? src : '/images/products/' + src;
    }

    let allProducts = [];
    let activeCat = 'All';
    let searchQ = '';
    let scrollY = 0;

    // ── Render grid ──────────────────────────────────────────────
    function render() {
      const grid = document.getElementById('grid');
      const filtered = allProducts.filter(p => {
        const catOk = activeCat === 'All' || p.category === activeCat;
        const q = searchQ.toLowerCase();
        const searchOk = !q ||
          (p.name && p.name.toLowerCase().includes(q)) ||
          (p.model && p.model.toLowerCase().includes(q)) ||
          (p.category && p.category.toLowerCase().includes(q));
        return catOk && searchOk;
      });

      if (!filtered.length) {
        grid.innerHTML = '<div class="no-results"><div class="no-results-title">NO PRODUCTS FOUND</div><div class="no-results-sub">Try a different filter or search term.</div></div>';
        return;
      }

      grid.innerHTML = filtered.map(p => {
        const thumb = p.images && p.images.length ? imgUrl(p.images[0]) : PLACEHOLDER;
        const hasSW  = !!p.softwareUrl;
        const hasMAN = !!p.manualUrl;
        return `
          <div class="prod-card" data-id="${p.id}" role="button" tabindex="0" aria-label="${p.name}">
            <div class="card-brackets"></div>
            <div class="card-scan"></div>
            <div class="card-img-wrap">
              <span class="card-cat">${p.category}</span>
              <img src="${thumb}" alt="${p.name || p.model}" loading="lazy"
                   onerror="this.src='${PLACEHOLDER}'" />
            </div>
            <div class="card-body">
              <div class="card-model">${p.model || p.id}</div>
              <div class="card-name">${p.name || ''}</div>
              ${(hasSW || hasMAN) ? `<div class="card-footer">
                ${hasSW  ? '<span class="card-badge sw">Software</span>'  : ''}
                ${hasMAN ? '<span class="card-badge man">Manual</span>' : ''}
              </div>` : ''}
            </div>
          </div>`;
      }).join('');

      grid.querySelectorAll('.prod-card').forEach(card => {
        card.addEventListener('click', () => openModal(card.dataset.id));
        card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') openModal(card.dataset.id); });
      });
    }

    // ── Counts ───────────────────────────────────────────────────
    function updateCounts() {
      const cats = ['All','Mouse','Keyboard','Headset','Gamepad','Accessories','Combo'];
      cats.forEach(c => {
        const el = document.getElementById('cnt-' + c);
        if (!el) return;
        const n = c === 'All' ? allProducts.length : allProducts.filter(p => p.category === c).length;
        el.textContent = n;
      });
    }

    // ── Filter buttons ───────────────────────────────────────────
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeCat = btn.dataset.cat;
        render();
      });
    });

    // ── Search ───────────────────────────────────────────────────
    const searchEl = document.getElementById('search');
    if (searchEl) {
      searchEl.addEventListener('input', () => {
        searchQ = searchEl.value.trim();
        render();
      });
    }

    // ── Modal ────────────────────────────────────────────────────
    const overlay  = document.getElementById('modal');
    const closeBtn = document.getElementById('modal-close');

    function openModal(id) {
      const p = allProducts.find(x => x.id === id);
      if (!p) return;

      // Populate header
      document.getElementById('modal-cat-label').textContent = p.category + ' / ' + (p.model || p.id);
      document.getElementById('modal-cat').textContent   = p.category;
      document.getElementById('modal-name').textContent  = p.name || p.model || p.id;
      document.getElementById('modal-model').textContent = p.model ? 'MODEL: ' + p.model : '';

      // Main image
      const imgs   = p.images && p.images.length ? p.images : [];
      const mainSrc = imgs.length ? imgUrl(imgs[0]) : PLACEHOLDER;
      const mainImg = document.getElementById('modal-img');
      mainImg.src = mainSrc;
      mainImg.alt = p.name || p.model || '';
      mainImg.onerror = () => { mainImg.src = PLACEHOLDER; };

      // Thumbnails
      const thumbsWrap = document.getElementById('modal-thumbs');
      if (imgs.length > 1) {
        thumbsWrap.innerHTML = imgs.map((src, i) => `
          <div class="modal-thumb${i === 0 ? ' active' : ''}" data-i="${i}">
            <img src="${imgUrl(src)}" alt="" onerror="this.src='${PLACEHOLDER}'" />
          </div>`).join('');
        thumbsWrap.querySelectorAll('.modal-thumb').forEach(t => {
          t.addEventListener('click', () => {
            mainImg.src = imgUrl(imgs[parseInt(t.dataset.i)]);
            thumbsWrap.querySelectorAll('.modal-thumb').forEach(x => x.classList.remove('active'));
            t.classList.add('active');
          });
        });
      } else {
        thumbsWrap.innerHTML = '';
      }

      // Actions
      const actWrap = document.getElementById('modal-actions');
      actWrap.innerHTML = '';
      if (p.softwareUrl) {
        const a = document.createElement('a');
        a.href = p.softwareUrl; a.target = '_blank'; a.rel = 'noopener';
        a.className = 'btn btn-primary';
        a.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Software`;
        actWrap.appendChild(a);
      }
      if (p.manualUrl) {
        const a = document.createElement('a');
        a.href = p.manualUrl; a.target = '_blank'; a.rel = 'noopener';
        a.className = 'btn btn-outline';
        a.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Manual`;
        actWrap.appendChild(a);
      }

      // Features
      const featWrap = document.getElementById('modal-features-wrap');
      const featList = document.getElementById('modal-features');
      const feats = p.features || p.keyFeatures || [];
      if (feats.length) {
        featList.innerHTML = feats.map(f => `<li>${f}</li>`).join('');
        featWrap.style.display = '';
      } else {
        featWrap.style.display = 'none';
      }

      // Specs
      const specsWrap  = document.getElementById('modal-specs-wrap');
      const specsTable = document.getElementById('modal-specs');
      const specs = p.specs || {};
      const specKeys = Object.keys(specs);
      if (specKeys.length) {
        specsTable.innerHTML = specKeys.map(k =>
          `<tr><td>${k}</td><td>${specs[k]}</td></tr>`
        ).join('');
        specsWrap.style.display = '';
      } else {
        specsWrap.style.display = 'none';
      }

      // Lock body & open
      scrollY = window.scrollY;
      document.body.style.overflow   = 'hidden';
      document.body.style.position   = 'fixed';
      document.body.style.top        = '-' + scrollY + 'px';
      document.body.style.width      = '100%';

      overlay.scrollTop = 0;
      overlay.classList.add('open');
      overlay.setAttribute('aria-hidden', 'false');
      overlay.focus();
    }

    function closeModal() {
      overlay.classList.remove('open');
      overlay.setAttribute('aria-hidden', 'true');
      document.body.style.overflow  = '';
      document.body.style.position  = '';
      document.body.style.top       = '';
      document.body.style.width     = '';
      window.scrollTo(0, scrollY);
    }

    closeBtn.addEventListener('click', closeModal);
    overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    // ── Load data ────────────────────────────────────────────────
    fetch('/data/products.json')
      .then(r => r.json())
      .then(data => {
        allProducts = data;
        updateCounts();
        render();
      })
      .catch(() => {
        document.getElementById('grid').innerHTML =
          '<div class="no-results"><div class="no-results-title">FAILED TO LOAD</div><div class="no-results-sub">Could not load products.json</div></div>';
      });

  })();
  </script>
</body>
</html>
